<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>虚拟聊天室 - WebRTC 模拟</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="lobby-screen" class="screen active">
      <div class="lobby-container">
        <h1 class="lobby-title">🎙️ 虚拟聊天室</h1>
        <p class="lobby-subtitle">模拟 WebRTC 连接状态 · 纯前端原型</p>
        <div class="lobby-actions">
          <div class="lobby-card">
            <h2>创建房间</h2>
            <p>随机生成一个四位数房间号</p>
            <button id="btn-create-room" class="btn btn-primary">创建房间</button>
          </div>
          <div class="lobby-card">
            <h2>加入房间</h2>
            <p>输入四位数房间号加入</p>
            <input id="input-room-id" type="text" maxlength="4" placeholder="输入房间号" />
            <button id="btn-join-room" class="btn btn-secondary">加入房间</button>
          </div>
        </div>
        <div id="lobby-error" class="error-msg hidden"></div>
      </div>
    </div>

    <div id="room-screen" class="screen">
      <div class="room-header">
        <div class="room-info">
          <span class="room-id-label">房间: <strong id="room-id-display"></strong></span>
          <span id="room-status-badge" class="status-badge">连接中</span>
        </div>
        <div class="room-actions-top">
          <button id="btn-simulate-disconnect" class="btn btn-warning btn-sm">模拟断线</button>
          <button id="btn-reset" class="btn btn-danger btn-sm">离开房间</button>
        </div>
      </div>

      <div class="room-body">
        <div id="participants-grid" class="participants-grid">
        </div>

        <div class="center-visualizer">
          <canvas id="audio-canvas" width="400" height="120"></canvas>
        </div>
      </div>

      <div class="room-footer">
        <div class="footer-controls">
          <button id="btn-mute" class="btn btn-control">
            <span class="icon">🎤</span>
            <span class="label">静音</span>
          </button>
          <button id="btn-push-to-talk" class="btn btn-control btn-push">
            <span class="icon">🔊</span>
            <span class="label">按住发言</span>
          </button>
          <button id="btn-share-screen" class="btn btn-control">
            <span class="icon">🖥️</span>
            <span class="label">共享屏幕</span>
          </button>
        </div>
      </div>

      <button id="btn-chat-float-toggle" class="btn-chat-float hidden" title="聊天">
        <span class="float-icon">💬</span>
      </button>

      <div id="chat-panel" class="chat-panel">
        <div class="chat-header">
          <span>聊天</span>
          <button id="btn-toggle-chat" class="btn-chat-toggle">✕</button>
        </div>
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-area">
          <input id="chat-input" type="text" placeholder="输入消息..." />
          <button id="btn-send-chat" class="btn btn-sm">发送</button>
        </div>
      </div>

      <div id="screen-share-picker" class="modal hidden">
        <div class="modal-content">
          <h3>选择要共享的屏幕</h3>
          <ul class="screen-list">
            <li class="screen-item" data-screen="screen-1">
              <div class="screen-thumb">🖥️</div>
              <span>主显示器 (1920×1080)</span>
            </li>
            <li class="screen-item" data-screen="screen-2">
              <div class="screen-thumb">🖥️</div>
              <span>副显示器 (2560×1440)</span>
            </li>
            <li class="screen-item" data-screen="window-1">
              <div class="screen-thumb">🪟</div>
              <span>Chrome 浏览器窗口</span>
            </li>
          </ul>
          <button id="btn-cancel-share" class="btn btn-sm">取消</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
